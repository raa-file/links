<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ريم الحربي | Graphic Design</title>
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon-180.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --pink: #E7848E;
    --magenta: #E3367F;
    --ink: #2B2B2B;
    --gray: #8A8A8A;
    --line: #EFEFEF;
    --bg: #FFFFFF;
  }

  *{ box-sizing: border-box; }

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);
    font-family: 'Tajawal', sans-serif;
    color: var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 20px;
  }

  .page{
    width:100%;
    max-width: 420px;
    text-align:center;
  }

  .logo-name{
    font-family:'Tajawal', sans-serif;
    font-weight:900;
    font-size: 44px;
    line-height:1;
    margin: 0;
    letter-spacing: 0.5px;
  }

  .name-reem{ color: #E3367F; }
  .name-harbi{ color: #E7848E; }

  .logo-sub{
    font-family:'Poppins', sans-serif;
    font-weight:300;
    letter-spacing: 6px;
    font-size: 14px;
    color: var(--gray);
    margin: 6px 0 0;
    text-transform: uppercase;
  }

  .divider{
    width: 46px;
    height: 3px;
    margin: 26px auto 30px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--pink), var(--magenta));
  }

  .links{
    display:flex;
    flex-direction:column;
    gap: 14px;
  }

  .link-btn{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    padding: 16px 20px;
    border-radius: 16px;
    border: 1.5px solid var(--line);
    background: #FFFFFF;
    text-decoration:none;
    color: var(--ink);
    font-family:'Tajawal', sans-serif;
    font-weight:700;
    font-size: 17px;
    overflow:hidden;
    transition: border-color .25s ease, transform .18s ease, box-shadow .25s ease;
  }

  .link-btn::before{
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(100deg, var(--pink), var(--magenta));
    opacity:0;
    transition: opacity .25s ease;
    z-index:0;
  }

  .link-btn:hover{
    border-color: transparent;
    transform: translateY(-2px);
    box-shadow: 0 10px 24px -10px rgba(194,67,143,0.45);
  }

  .link-btn:hover::before{ opacity:1; }

  .link-btn:hover .btn-label,
  .link-btn:hover .btn-sub{ color:#fff; }

  .icon-wrap{
    position:relative;
    z-index:1;
    width: 44px;
    height:44px;
    flex-shrink:0;
    border-radius: 12px;
    display:flex;
    align-items:center;
    justify-content:center;
    background: linear-gradient(135deg, #fdf0f0, #f7e9f2);
  }

  .icon-wrap svg{ width:22px; height:22px; }

  .btn-text{
    position:relative;
    z-index:1;
    text-align:right;
    flex:1;
  }

  .btn-label{
    display:block;
    transition: color .25s ease;
  }

  .btn-sub{
    display:block;
    font-family:'Poppins', sans-serif;
    font-weight:300;
    font-size: 12px;
    color: var(--gray);
    margin-top:2px;
    transition: color .25s ease;
    direction: ltr;
    text-align: right;
  }

  footer{
    margin-top: 40px;
    font-family:'Poppins', sans-serif;
    font-size: 12px;
    color: var(--gray);
    letter-spacing: 1px;
  }

  @media (prefers-reduced-motion: reduce){
    .link-btn, .link-btn::before, .btn-label, .btn-sub{ transition:none; }
  }
</style>
</head>
<body>

<div class="page">
  <h1 class="logo-name"><span class="name-reem">ريم</span> <span class="name-harbi">الحربي</span></h1>
  <p class="logo-sub">Graphic Design</p>

  <div class="divider"></div>

      </span>

        <svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke="#C2438F" stroke-width="1.6"/><circle cx="12" cy="12" r="4" stroke="#C2438F" stroke-width="1.6"/><circle cx="17.2" cy="6.8" r="1.1" fill="#C2438F"/></svg>

      <span class="btn-text">

</body>
</html>
