  :root{
    --pink: #E7848E;
    --magenta: #E3367F;

    --line: #EFEFEF;

  body{
    margin:0;
    min-height:100vh;
    background: var(--bg);

    align-items:center;
    justify-content:center;

  }

    width:100%;
    max-width: 420px;
    text-align:center;
  }

  .logo-name{
    font-family:'Jawadtaut', sans-serif;

    font-size: 48px;
    line-height:1;
